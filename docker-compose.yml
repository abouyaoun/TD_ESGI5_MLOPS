services:

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: models/model.joblib
      MODEL_NAME: loan-classifier
      MODEL_VERSION: "1.0"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped
