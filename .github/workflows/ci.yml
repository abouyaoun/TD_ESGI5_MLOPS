name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & Type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check mlproject/

      - name: Type check (mypy)
        run: mypy mlproject/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  train:
    name: Train & upload model
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Generate dataset
        run: |
          mkdir -p data
          python -c "
          import pandas as pd, numpy as np
          rng = np.random.default_rng(42)
          n = 500
          pd.DataFrame({
              'loan_id': range(1, n+1),
              'no_of_dependents': rng.integers(0, 6, n),
              'education': rng.choice(['Graduate', 'Not Graduate'], n),
              'self_employed': rng.choice(['Yes', 'No'], n),
              'income_annum': rng.integers(200000, 9900000, n),
              'loan_amount': rng.integers(300000, 39500000, n),
              'loan_term': rng.integers(2, 20, n),
              'cibil_score': rng.integers(300, 900, n),
              'residential_assets_value': rng.integers(100000, 29000000, n),
              'commercial_assets_value': rng.integers(0, 19700000, n),
              'luxury_assets_value': rng.integers(300000, 39200000, n),
              'bank_asset_value': rng.integers(0, 14900000, n),
              'loan_status': rng.choice([' Approved', ' Rejected'], n),
          }).to_csv('data/loan_approval_dataset.csv', index=False)
          "

      - name: Train model
        run: |
          mkdir -p models
          PYTHONPATH=. python -m mlproject.train --no-mlflow 2>/dev/null || \
          python -c "
          from mlproject.data import load_data, split
          from mlproject.features import build_preprocessor
          from sklearn.linear_model import LogisticRegression
          from sklearn.pipeline import Pipeline
          from sklearn.metrics import f1_score, roc_auc_score
          import joblib
          df = load_data()
          X_train, X_test, y_train, y_test = split(df)
          model = Pipeline([('pre', build_preprocessor()), ('clf', LogisticRegression(max_iter=1000))])
          model.fit(X_train, y_train)
          proba = model.predict_proba(X_test)[:, 1]
          preds = (proba >= 0.5).astype(int)
          print(f'f1={f1_score(y_test, preds):.3f}  roc_auc={roc_auc_score(y_test, proba):.3f}')
          joblib.dump(model, 'models/model.joblib')
          "

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/model.joblib
          retention-days: 1
