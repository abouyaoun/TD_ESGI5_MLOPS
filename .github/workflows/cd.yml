name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    # Ne s'exécute que si le CI est passé au vert
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Récupère le modèle entraîné par le CI (évite de réentraîner)
      - name: Download model artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags : latest + sha court pour la traçabilité
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short,src=${{ github.event.workflow_run.head_sha }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start API container
        run: |
          docker run -d --name api -p 8000:8000 \
            ghcr.io/${{ github.repository }}:latest
          for i in $(seq 1 15); do
            sleep 2
            curl -sf http://localhost:8000/health && break
            echo "Attente... ($i/15)"
          done

      - name: GET /health
        run: |
          curl -sf http://localhost:8000/health | grep '"status":"ok"'

      - name: POST /predict
        run: |
          curl -sf -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{
              "no_of_dependents": 2,
              "education": "Graduate",
              "self_employed": "No",
              "income_annum": 5000000,
              "loan_amount": 12000000,
              "loan_term": 10,
              "cibil_score": 750,
              "residential_assets_value": 8000000,
              "commercial_assets_value": 2000000,
              "luxury_assets_value": 5000000,
              "bank_asset_value": 3000000
            }' | grep '"prediction"'

      - name: Cleanup
        if: always()
        run: docker rm -f api || true
